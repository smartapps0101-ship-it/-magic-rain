workflows:
  ios-workflow:
    name: Magic Rain iOS
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.smartapps.magicrain
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build iOS
        script: npm install && npx cap sync ios
      - name: Xcode build
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/App/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: Codemagic
        key_id: B6RHC26A8M
        issuer_id: 47a4bfd1-7959-4bec-a3d1-09b78eb6abe7
        submit_to_testflight: true