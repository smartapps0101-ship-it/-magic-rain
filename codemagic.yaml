workflows:
  ios-workflow:
    name: Magic Rain iOS
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.smartapps.magicrain
        certificate_name: MagicRain
        provisioning_profile_name: MagicRain
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/ios
      - name: Build iOS
        script: node_modules/.bin/cap sync ios
      - - name: Xcode build
        script: |
          cd ios/App
          pod install
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ../../build/App.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER=MagicRain \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM=TSMTKVR62X \
            archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/App/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: Codemagic
        key_id: B6RHC26A8M
        issuer_id: 47a4bfd1-7959-4bec-a3d1-09b78eb6abe7
        submit_to_testflight: true